<!DOCTYPE html>
<html>
<head>
  <title>Vehicle Rental</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Vehicle Rental 🚗🏍️</h1>

<button onclick="logout()">Logout</button>

<button onclick="setType('car')">Cars</button>

<button onclick="setType('bike')">Bikes</button>

<div id="vehicles"></div>

<!-- OVERLAY -->
<div id="overlay" onclick="closeForm()"></div>

<!-- BOOKING FORM -->
<div id="bookingForm">

  <span onclick="closeForm()">❌</span>

  <h3>Complete Booking</h3>

  <!-- NAME -->
  <input
    type="text"
    id="userName"
    placeholder="Enter Name"
  >

  <!-- PHONE -->
  <input
    type="text"
    id="phone"
    placeholder="Enter 10 Digit Phone Number"
    maxlength="10"
  >

  <!-- AADHAAR -->
  <input
    type="text"
    id="aadhaar"
    placeholder="Enter 12 Digit Aadhaar Number"
    maxlength="12"
  >

  <!-- PAN CARD -->
  <input
    type="text"
    id="panCard"
    placeholder="Enter PAN Card Number"
    maxlength="10"
  >

  <label>Driving License Number:</label>
<input 
    type="text" 
    id="license" 
    placeholder="Ex: KA01AB1234567"
    required
>

  <!-- START DATE -->
  <input
    type="date"
    id="startDate"
  >

  <!-- END DATE -->
  <input
    type="date"
    id="endDate"
  >

  <p id="totalPrice"></p>

  <button onclick="submitBooking()">
    Submit
  </button>

</div>

<!-- ✅ BILL POPUP -->
<div id="billPopup">

  <h3>Bill Summary</h3>

  <p id="billDays"></p>

  <p id="billPrice"></p>

  <p id="billTotal"></p>

  <button onclick="confirmBooking()">
    Confirm
  </button>

  <button onclick="closeBill()">
    Cancel
  </button>

</div>

<script src="script.js"></script>

</body>
</html>
